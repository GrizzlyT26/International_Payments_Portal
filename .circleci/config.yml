version: 2.1

orbs:
  sonarcloud: sonarsource/sonarcloud@2.0.0

jobs:
  build-and-test:
    docker:
      - image: cimg/node:20.10.0  # For React client
    steps:
      - checkout
      
      # Install and test REACT CLIENT
      - run:
          name: Install Client Dependencies
          command: cd international_payments_portal.client && npm install
      - run:
          name: Test Client with Coverage
          command: cd international_payments_portal.client && npm test -- --coverage --watchAll=false
      
      # Save client coverage
      - persist_to_workspace:
          root: .
          paths:
            - international_payments_portal.client/coverage

  dotnet-build-and-test:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:9.0  # For .NET Server
    steps:
      - checkout
      
      # Restore and build .NET SERVER
      - run:
          name: Restore .NET dependencies
          command: dotnet restore International_Payments_Portal.Server
      - run:
          name: Build .NET Server
          command: dotnet build International_Payments_Portal.Server --configuration Release --no-restore
      - run:
          name: Run .NET Tests
          command: dotnet test International_Payments_Portal.Server --no-restore --verbosity normal --collect:"XPlat Code Coverage"
      
      # Save server coverage
      - persist_to_workspace:
          root: .
          paths:
            - International_Payments_Portal.Server/TestResults

  sonarcloud-scan:
    docker:
      - image: cimg/node:20.10.0
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Install SonarCloud Scanner
          command: npm install -g sonar-scanner
      - run:
          name: Run SonarCloud Scan
          command: |
            sonar-scanner \
              -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
              -Dsonar.organization=${SONAR_ORG} \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.login=${SONAR_TOKEN} \
              -Dsonar.sources=international_payments_portal.client/src,International_Payments_Portal.Server \
              -Dsonar.exclusions=**/node_modules/**,**/bin/**,**/obj/** \
              -Dsonar.javascript.lcov.reportPaths=international_payments_portal.client/coverage/lcov.info

  security-audit:
    docker:
      - image: cimg/node:20.10.0
    steps:
      - checkout
      - run:
          name: NPM Security Audit
          command: cd international_payments_portal.client && npm audit --audit-level=high || true

workflows:
  version: 2
  payment-portal-workflow:
    jobs:
      - build-and-test
      - dotnet-build-and-test
      - sonarcloud-scan:
          requires:
            - build-and-test
            - dotnet-build-and-test
      - security-audit:
          requires:
            - build-and-test