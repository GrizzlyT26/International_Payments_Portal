version: 2.1

orbs:
  sonarcloud: sonarsource/sonarcloud@2.0.0

jobs:
  # React Client Build & Test
  build-and-test:
    docker:
      - image: cimg/node:20.10.0
    steps:
      - checkout
      - run:
          name: Install Client Dependencies
          command: cd international_payments_portal.client && npm install
      - run:
          name: Test Client (skip if no tests)
          command: cd international_payments_portal.client && npm test -- --watchAll=false || echo "No tests yet, continuing..."
      - persist_to_workspace:
          root: .
          paths:
            - international_payments_portal.client

  # .NET Server Build & Test
  dotnet-build-and-test:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:10.0
    steps:
      - checkout
      - run:
          name: Install Node.js (required by JavaScript SDK)
          command: |
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -y nodejs
      - run:
          name: Restore .NET dependencies
          command: dotnet restore International_Payments_Portal.Server
      - run:
          name: Build .NET Server
          command: dotnet build International_Payments_Portal.Server --configuration Release --no-restore
      - run:
          name: Run .NET Tests (skip if none)
          command: dotnet test International_Payments_Portal.Server --no-restore --verbosity normal || echo "No tests yet, continuing..."
      - persist_to_workspace:
          root: .
          paths:
            - International_Payments_Portal.Server

  # SonarCloud Quality Scan
  sonarcloud-scan:
    docker:
      - image: cimg/node:20.10.0
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Install SonarCloud Scanner
          command: npm install -g sonar-scanner
      - run:
          name: Run SonarCloud Scan
          command: |
            sonar-scanner \
              -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
              -Dsonar.organization=${SONAR_ORG} \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.login=${SONAR_TOKEN} \
              -Dsonar.sources=international_payments_portal.client/src,International_Payments_Portal.Server \
              -Dsonar.exclusions=**/node_modules/**,**/bin/**,**/obj/**,**/wwwroot/** \
              -Dsonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx \
              -Dsonar.cs.opencover.reportsPaths=**/TestResults/**/coverage.opencover.xml

  # Security Audit
  security-audit:
    docker:
      - image: cimg/node:20.10.0
    steps:
      - checkout
      - run:
          name: NPM Security Audit
          command: cd international_payments_portal.client && npm audit --audit-level=high || true
      - run:
          name: Check for Hardcoded Secrets
          command: |
            if grep -rn "password\|secret\|api_key\|token" --include="*.js" --include="*.jsx" --include="*.cs" international_payments_portal.client/src International_Payments_Portal.Server 2>/dev/null | grep -v "//" | grep -q .; then
              echo "❌ Hardcoded secrets detected!"
              exit 1
            else
              echo "✅ No hardcoded secrets found"
            fi

workflows:
  version: 2
  payment-portal-workflow:
    jobs:
      - build-and-test
      - dotnet-build-and-test
      - sonarcloud-scan:
          requires:
            - build-and-test
            - dotnet-build-and-test
      - security-audit:
          requires:
            - build-and-test