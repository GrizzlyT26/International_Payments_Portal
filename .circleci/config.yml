version: 2.1

orbs:
  sonarcloud: sonarsource/sonarcloud@2.0.0

jobs:
  build-and-test:
    docker:
      - image: cimg/node:20.10.0
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-deps-{{ checksum "package-lock.json" }}
      - run:
          name: Install Client Dependencies
          command: cd client && npm ci
      - run:
          name: Test Client with Coverage
          command: cd client && npm test -- --coverage --watchAll=false
      - run:
          name: Install Server Dependencies
          command: cd server && npm ci
      - run:
          name: Test Server with Coverage
          command: cd server && npm test -- --coverage --watchAll=false
      - save_cache:
          key: npm-deps-{{ checksum "package-lock.json" }}
          paths:
            - client/node_modules
            - server/node_modules
      - persist_to_workspace:
          root: .
          paths:
            - client/coverage
            - server/coverage

  sonarcloud-scan:
    docker:
      - image: cimg/node:20.10.0
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Run SonarCloud Scan
          command: |
            npx sonar-scanner \
              -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
              -Dsonar.organization=${SONAR_ORG} \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.login=${SONAR_TOKEN} \
              -Dsonar.sources=client/src,server/src \
              -Dsonar.exclusions=**/node_modules/** \
              -Dsonar.javascript.lcov.reportPaths=client/coverage/lcov.info,server/coverage/lcov.info

  security-audit:
    docker:
      - image: cimg/node:20.10.0
    steps:
      - checkout
      - run:
          name: NPM Security Audit
          command: npm audit --audit-level=high || true
      - run:
          name: Check for Hardcoded Secrets
          command: |
            if grep -rn "password\|secret\|api_key\|token" --include="*.js" --include="*.jsx" client/src server/src 2>/dev/null | grep -v "//" | grep -q .; then
              echo "❌ Hardcoded secrets detected!"
              exit 1
            else
              echo "✅ No hardcoded secrets found"
            fi

workflows:
  version: 2
  payment-portal-workflow:
    jobs:
      - build-and-test
      - sonarcloud-scan:
          requires:
            - build-and-test
      - security-audit:
          requires:
            - build-and-test